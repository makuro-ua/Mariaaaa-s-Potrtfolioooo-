<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Form</title>
  <link rel="stylesheet" href="../CSS/style.css">
</head>
<body>
    <h1 style="color:orange">How can we help?</h1>
<fieldset>
        <legend style="color:blue">Request for Proposal</legend> 
        <form class="form">
  <div class="row">
    <label>Your name:</label>
    <input type="text">
  </div>

  <div class="row">
    <label>Email:</label>
    <input type="email">
  </div>

  <div class="row">
    <label>Username:</label>
    <input type="text">
  </div>

  <div class="row">
    <label>Password:</label>
    <input type="password">
  </div>
  <div class="row">
    <label style="margin-top: 50px;">Your Business:</label>
    <textarea placeholder="Briefly describe your business in this space" style="height: 120px; width: 345px;"></textarea>
  </div>
  <div class="row">
    <label>Company size:</label>
    <div class="options">
    <li>
      <label><input type="radio" name="size"> Less than 10</label>
    </li>
    <li>
        <label><input type="radio" name="size"> 11 to 50</label>
    </li>
    <li>
        <label><input type="radio" name="size"> 50 to 200</label>
    </li>
    <li>
      <label><input type="radio" name="size"> Over 200</label>
    </li>
    </div>
  </div>

  <div class="row">
    <label>Service:</label>
    <div class="options">
      <label><input type="checkbox"> Brand Identity</label>
      <label><input type="checkbox"> New Website</label>
      <label><input type="checkbox"> Web Redesign</label>
    </div>
  </div>

  <div class="row">
    <label>Timeline:</label>
    <select>
      <option>Immediately</option>
      <option>1-2 weeks</option>
      <option>3–6 weeks</option>
      <option>7-2 months</option>
    </select>
  </div>

  <div class="row">
    <label></label>
    <button type="submit">Send to dev\design</button>
  </div>
</form>


</body>
</html>
