<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LabTask6-1</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            padding: 20px;
        }

        .exercise-container {
            background-color: white;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid #ddd;
            max-width: 500px;
        }

        .block-input {
            display: block;
            margin-bottom: 10px;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 2px;
            width: 200px;
        }

        .inline-para {
            display: inline-block;
            width: 250px;
            vertical-align: middle;
            margin-right: 10px;
        }

        .inline-btn {
            display: inline-block;
            vertical-align: middle;
            padding: 5px 15px;
            background-color: white;
            border: 1px solid #888;
            cursor: pointer;
        }

        .google-logo {
            width: 160px;
            display: block;
            margin: 0 auto 15px auto;
        }

        .google-search {
            display: block;
            width: 90%;
            margin: 0 auto;
            padding: 12px 20px;
            border: 1px solid #dfe1e5;
            border-radius: 24px;
            box-shadow: 0 1px 6px rgba(32,33,36,0.28);
            outline: none;
        }

        .signup-container {
            width: 320px;
        }

        .name-input {
            width: 125px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-bottom: 10px;
        }

        .email-input {
            width: 275px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            display: block;
            margin-bottom: 15px;
        }

        .signup-btn {
            width: 100%;
            padding: 12px;
            background-color: #4c8bf5;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        .uber-container {
            width: 350px;
        }

        .uber-container h1 {
            font-size: 32px;
            margin-bottom: 20px;
        }

        .uber-input {
            display: block;
            width: 90%;
            padding: 12px;
            background-color: #eeeeee;
            border: none;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .request-btn {
            background-color: black;
            color: white;
            padding: 12px 20px;
            border: none;
            margin-right: 10px;
            cursor: pointer;
        }

        .schedule-btn {
            background-color: #eeeeee;
            color: black;
            padding: 12px 20px;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="exercise-container">
        <input type="text" class="block-input" placeholder="Name">
        <input type="text" class="block-input" placeholder="Email">
    </div>

    <div class="exercise-container">
        <p class="inline-para">Thanks for chatting with our customer support. Would you like to take our quick survey?</p>
        <button class="inline-btn">Yes</button>
        <button class="inline-btn">No</button>
    </div>

    <div class="exercise-container">
        <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" class="google-logo" alt="Google Logo">
        <input type="text" class="google-search" placeholder="Search Google or type a URL">
    </div>

    <div class="exercise-container signup-container">
        <input type="text" class="name-input" placeholder="First name">
        <input type="text" class="name-input" placeholder="Last name">
        <input type="text" class="email-input" placeholder="Email">
        <button class="signup-btn">Sign Up</button>
    </div>

    <div class="exercise-container uber-container">
        <h1>Request a ride now</h1>
        <input type="text" class="uber-input" placeholder="Enter pickup location">
        <input type="text" class="uber-input" placeholder="Enter destination">
        <div style="margin-top: 20px;">
            <button class="request-btn">Request now</button>
            <button class="schedule-btn">Schedule for later</button>
        </div>
    </div>

</body>
</html>
